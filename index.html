<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>秋木科技</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    :root {
      --glass-bg: rgba(255,255,255,0.12);
      --glass-border: rgba(255,255,255,0.2);
      --glass-shadow: 0 8px 32px 0 rgba(31,38,135,0.25);
      --text-primary: #fff;
      --text-secondary: rgba(255,255,255,0.65);
      --text-link: #93c5fd;
      --radius-lg: 22px;
      --radius-md: 14px;
      --radius-pill: 50px;
      --transition-smooth: 0.35s cubic-bezier(0.25, 0.8, 0.25, 1.2);
    }
    * { box-sizing:border-box; margin:0; padding:0; }
    html { scroll-behavior: smooth; }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.25);
      border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.4); }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      background-attachment: fixed;
      color: var(--text-primary);
      min-height: 100vh;
      padding-bottom: 40px;
      line-height: 1.5;
      transition: background 0.8s ease;
      position: relative;
      overflow-x: hidden;
    }
    body.dark-mode {
      background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
    }

    #bgCanvas {
      position: fixed; inset: 0; z-index: 0;
      pointer-events: none;
    }

    .glass {
      background: var(--glass-bg);
      backdrop-filter: blur(16px) saturate(180%);
      -webkit-backdrop-filter: blur(16px) saturate(180%);
      border: 1px solid var(--glass-border);
      box-shadow: var(--glass-shadow);
    }
    .glass-strong {
      background: rgba(255,255,255,0.18);
      backdrop-filter: blur(24px) saturate(200%);
      -webkit-backdrop-filter: blur(24px) saturate(200%);
      border: 1px solid rgba(255,255,255,0.25);
    }

    .container { max-width:1400px; margin:0 auto; padding:0 24px; position:relative; z-index:1; }

    header {
      position: sticky; top:0; z-index:100; padding:10px 0;
      background: rgba(102,126,234,0.35);
      backdrop-filter: blur(24px) saturate(200%);
      -webkit-backdrop-filter: blur(24px) saturate(200%);
      border-bottom: 1px solid rgba(255,255,255,0.1);
      transition: background 0.5s, box-shadow 0.3s;
    }
    header.scrolled {
      box-shadow: 0 4px 24px rgba(0,0,0,0.12);
      background: rgba(102,126,234,0.55);
    }
    body.dark-mode header { background: rgba(15,12,41,0.6); }
    body.dark-mode header.scrolled { background: rgba(15,12,41,0.85); }
    .header-inner {
      display:flex; align-items:center; justify-content:space-between; height:52px;
    }
    .logo-area {
      display:flex; align-items:center; gap:12px;
      font-size:20px; font-weight:700; letter-spacing:0.5px; flex-shrink:0;
    }
    .logo-icon {
      width:38px; height:38px; border-radius:10px;
      background: linear-gradient(135deg, #f472b6, #ec4899);
      display:flex; align-items:center; justify-content:center;
      box-shadow: 0 4px 14px rgba(244,114,182,0.45);
      transition: transform 0.3s, box-shadow 0.3s;
    }
    .logo-icon:hover { transform: scale(1.08) rotate(-5deg); box-shadow: 0 6px 20px rgba(244,114,182,0.6); }
    .logo-icon i { color:#fff; font-size:17px; }

    .header-right { display:flex; align-items:center; gap:10px; }
    .header-clock {
      font-size:14px; font-weight:600; opacity:0.85;
      letter-spacing:0.5px; font-variant-numeric:tabular-nums;
      user-select:none;
    }
    .theme-toggle {
      width:38px; height:38px; border-radius:50%;
      display:flex; align-items:center; justify-content:center;
      cursor:pointer; transition:all 0.3s;
      background:rgba(255,255,255,0.15); border:none;
      color:#fef08a; font-size:17px; flex-shrink:0;
    }
    .theme-toggle:hover { background:rgba(255,255,255,0.3); transform:scale(1.1) rotate(15deg); }

    .search-section {
      padding:36px 0 10px;
      text-align:center;
    }
    .search-section-label {
      font-size:12px; color:var(--text-secondary); margin-bottom:14px;
      font-weight:500; letter-spacing:1px; text-transform:uppercase; opacity:0.7;
    }
    .search-row {
      display:flex; align-items:center; justify-content:center; gap:8px;
      max-width:680px; margin:0 auto;
      background:rgba(255,255,255,0.1);
      border-radius:var(--radius-pill);
      padding:5px; border:1px solid rgba(255,255,255,0.15);
      backdrop-filter: blur(8px);
    }
    .engine-btn {
      height:40px; padding:0 16px; border-radius:var(--radius-pill);
      background:transparent; border:none;
      color:rgba(255,255,255,0.7); font-size:13px; font-weight:600; cursor:pointer;
      white-space:nowrap; transition:all 0.25s; flex-shrink:0;
      position:relative;
    }
    .engine-btn:hover { color:#fff; }
    .engine-btn.active {
      background:#fff; color:#4b5563;
      box-shadow:0 2px 12px rgba(0,0,0,0.12);
    }
    .search-input {
      flex:1; height:40px; border-radius:var(--radius-pill); min-width:0;
      border:none; background:transparent;
      padding:0 12px; color:#fff; font-size:14px; transition:all 0.3s;
    }
    .search-input::placeholder { color:rgba(255,255,255,0.4); }
    .search-input:focus { outline:none; }
    .search-go {
      width:40px; height:40px; border-radius:50%;
      background:linear-gradient(135deg, #667eea, #764ba2);
      border:none; color:#fff; font-size:14px; cursor:pointer; flex-shrink:0;
      display:flex; align-items:center; justify-content:center;
      transition:all 0.25s; box-shadow:0 2px 10px rgba(102,126,234,0.4);
    }
    .search-go:hover { transform:scale(1.08); box-shadow:0 4px 16px rgba(102,126,234,0.55); }

    .hero { text-align:center; padding:24px 0 28px; }
    .hero h1 {
      font-size:38px; font-weight:800; margin-bottom:8px;
      background: linear-gradient(135deg, #fff 0%, #e0e7ff 50%, #c4b5fd 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: none;
      line-height:1.2;
    }
    .hero p { font-size:15px; color:var(--text-secondary); max-width:500px; margin:0 auto; font-weight:300; }
    .hero .link-count {
      display:inline-block; margin-top:10px;
      padding:4px 14px; border-radius:20px;
      background:rgba(255,255,255,0.15); font-size:12px; color:var(--text-secondary);
      border:1px solid rgba(255,255,255,0.1);
    }

    .filter-section { margin-bottom:22px; }
    .filter-row { display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
    .filter-bar {
      display:flex; gap:8px; padding:6px 8px;
      border-radius:var(--radius-lg); overflow-x:auto;
      scrollbar-width:none; flex:1;
    }
    .filter-bar::-webkit-scrollbar { display:none; }
    .filter-btn {
      display:flex; align-items:center; gap:6px;
      padding:8px 16px; border-radius:var(--radius-md);
      background:rgba(255,255,255,0.08); color:var(--text-primary);
      border:1px solid transparent; cursor:pointer;
      white-space:nowrap; font-size:13px; font-weight:500;
      transition:all 0.25s; position:relative;
    }
    .filter-btn:hover { background:rgba(255,255,255,0.2); transform:translateY(-1px); }
    .filter-btn.active {
      background:rgba(255,255,255,0.95); color:#4b5563;
      box-shadow:0 4px 16px rgba(0,0,0,0.12); font-weight:600;
    }
    .filter-btn i { font-size:13px; }
    .filter-count {
      font-size:10px; background:rgba(255,255,255,0.2);
      padding:1px 6px; border-radius:10px; font-weight:600;
    }
    .filter-btn.active .filter-count { background:rgba(0,0,0,0.1); }


    .grid-container {
      display:grid;
      grid-template-columns:repeat(auto-fill, minmax(210px, 1fr));
      gap:18px;
      perspective:1000px;
    }

    .card {
      position:relative; border-radius:var(--radius-lg); padding:22px 16px 18px;
      display:flex; flex-direction:column; align-items:center; text-align:center;
      transition: transform 0.15s ease-out, box-shadow 0.35s, border-color 0.35s;
      cursor:pointer; overflow:hidden; text-decoration:none; color:inherit;
      transform-style: preserve-3d;
    }
    .card::before {
      content:''; position:absolute; inset:0;
      background:linear-gradient(180deg, rgba(255,255,255,0.05) 0%, transparent 60%);
      pointer-events:none; z-index:0;
    }
    .card::after {
      content:''; position:absolute; inset:0; z-index:-1;
      background:radial-gradient(circle at center, var(--card-glow, transparent) 0%, transparent 70%);
      opacity:0; transition:opacity 0.4s;
    }
    .card:hover::after { opacity:0.35; }
    .card:hover {
      z-index:5;
      box-shadow:0 20px 40px rgba(0,0,0,0.2), 0 0 80px rgba(var(--glow-rgb, 255,255,255), 0.08);
      border-color:rgba(255,255,255,0.45);
      background:rgba(255,255,255,0.22);
    }
    .badge {
      position:absolute; top:12px; right:12px; z-index:3;
      font-size:10px; padding:3px 10px; border-radius:20px;
      font-weight:700; color:#fff; letter-spacing:0.5px;
      backdrop-filter:blur(4px);
    }
    .badge-hot { background:#ef4444; box-shadow:0 2px 10px rgba(239,68,68,0.5); animation:pulse-badge 2s infinite; }
    .badge-new { background:#3b82f6; box-shadow:0 2px 10px rgba(59,130,246,0.5); }
    .badge-rec { background:#10b981; box-shadow:0 2px 10px rgba(16,185,129,0.5); }
    @keyframes pulse-badge {
      0%,100% { transform:scale(1); }
      50% { transform:scale(1.08); }
    }
    .icon-wrapper {
      width:64px; height:64px; border-radius:16px;
      display:flex; align-items:center; justify-content:center;
      margin-bottom:12px; transition:transform 0.35s, box-shadow 0.35s;
      position:relative; z-index:1;
    }
    .card:hover .icon-wrapper {
      transform:scale(1.1) translateZ(20px);
      box-shadow:0 8px 24px rgba(0,0,0,0.2);
    }
    .icon-wrapper i { font-size:28px; color:#fff; filter:drop-shadow(0 2px 3px rgba(0,0,0,0.15)); }
    .card-title {
      font-size:15px; font-weight:700; margin-bottom:4px; color:#fff;
      position:relative; z-index:1;
    }
    .card-desc {
      font-size:11px; color:var(--text-secondary); margin-bottom:12px;
      line-height:1.5; position:relative; z-index:1;
    }
    .card-action {
      font-size:12px; color:var(--text-link); text-decoration:none;
      display:flex; align-items:center; gap:5px; font-weight:500;
      opacity:0.7; transition:all 0.25s; position:relative; z-index:1;
    }
    .card:hover .card-action { opacity:1; color:#fff; }
    .card-action i { transition:transform 0.3s; }
    .card:hover .card-action i { transform:translateX(3px); }

    .empty-state { text-align:center; padding:64px 0; grid-column:1/-1; }
    .empty-state i { font-size:52px; color:var(--text-secondary); margin-bottom:14px; display:block; opacity:0.5; }
    .empty-state p { color:var(--text-secondary); font-size:15px; }

    footer {
      text-align:center; padding:32px 0 16px;
      color:var(--text-secondary); font-size:12px;
      border-top:1px solid rgba(255,255,255,0.08); margin-top:32px;
    }
    footer .footer-brand { font-weight:700; font-size:13px; margin-bottom:4px; }

    @keyframes fadeInUp {
      from { opacity:0; transform:translateY(16px); }
      to   { opacity:1; transform:translateY(0); }
    }
    .card.visible { animation:fadeInUp 0.45s ease both; }

    @media(max-width:768px) {
      .search-row { gap:3px; padding:4px; flex-wrap:wrap; }
      .engine-btn { height:34px; padding:0 10px; font-size:11px; }
      .search-input { height:34px; font-size:13px; }
      .search-go { width:34px; height:34px; font-size:12px; }
      .hero h1 { font-size:26px; }
      .hero { padding:16px 0 18px; }
      .hero p { font-size:13px; }
      .grid-container { grid-template-columns:repeat(auto-fill, minmax(150px, 1fr)); gap:10px; }
      .card { padding:14px 10px 12px; border-radius:18px; }
      .icon-wrapper { width:48px; height:48px; border-radius:13px; margin-bottom:8px; }
      .icon-wrapper i { font-size:22px; }
      .card-title { font-size:13px; }
      .card-desc { font-size:10px; margin-bottom:8px; }
      .badge { font-size:9px; padding:2px 7px; top:8px; right:8px; }
      .filter-btn { padding:6px 10px; font-size:11px; }

      .header-clock { display:none; }
    }
  </style>
</head>

    }, 3000);
  })();

  (function(){
    var canvas = document.getElementById('bgCanvas');
    var ctx = canvas.getContext('2d');
    var particles = [];
    var PARTICLE_COUNT = 35;
    var mouseX = -999, mouseY = -999;
    var darkMode = false;

    function resize(){
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    var lightColors = ['#8baeee','#a78bfa','#c4b5fd','#f9a8d4','#93c5fd','#e0e7ff'];
    var darkColors  = ['#6d28d9','#4c1d95','#312e81','#1e1b4b','#4338ca','#3730a3'];

    function Particle(){
      this.reset();
    }
    Particle.prototype.reset = function(){
      this.x = Math.random() * canvas.width;
      this.y = Math.random() * canvas.height;
      this.size = Math.random() * 90 + 25;
      this.speedX = (Math.random() - 0.5) * 0.25;
      this.speedY = (Math.random() - 0.5) * 0.25;
      this.opacity = Math.random() * 0.12 + 0.03;
      this.color = darkMode
        ? darkColors[Math.floor(Math.random() * darkColors.length)]
        : lightColors[Math.floor(Math.random() * lightColors.length)];
    };
    Particle.prototype.update = function(){
      if (mouseX > -999){
        var dx = mouseX - this.x;
        var dy = mouseY - this.y;
        var dist = Math.sqrt(dx*dx + dy*dy);
        if (dist < 250 && dist > 1){
          this.x -= (dx/dist) * (1 - dist/250) * 0.4;
          this.y -= (dy/dist) * (1 - dist/250) * 0.4;
        }
      }
      this.x += this.speedX;
      this.y += this.speedY;
      var margin = 120;
      if (this.x < -margin || this.x > canvas.width + margin ||
          this.y < -margin || this.y > canvas.height + margin){
        this.reset();
      }
    };
    Particle.prototype.draw = function(){
      ctx.beginPath();
      var grad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size);
      grad.addColorStop(0, this.color);
      grad.addColorStop(1, 'transparent');
      ctx.fillStyle = grad;
      ctx.globalAlpha = this.opacity;
      ctx.arc(this.x, this.y, this.size, 0, Math.PI*2);
      ctx.fill();
      ctx.globalAlpha = 1;
    };

    for (var i = 0; i < PARTICLE_COUNT; i++){ particles.push(new Particle()); }

    document.addEventListener('mousemove', function(e){ mouseX = e.clientX; mouseY = e.clientY; });
    document.addEventListener('mouseleave', function(){ mouseX = -999; mouseY = -999; });

    function animate(){
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      for (var i = 0; i < particles.length; i++){
        particles[i].update();
        particles[i].draw();
      }
      requestAnimationFrame(animate);
    }
    animate();

    window._bgSetDark = function(d){
      darkMode = d;
      for (var i = 0; i < particles.length; i++){
        particles[i].color = darkMode
          ? darkColors[Math.floor(Math.random() * darkColors.length)]
          : lightColors[Math.floor(Math.random() * lightColors.length)];
      }
    };
  })();

    var el = document.getElementById('headerClock');
    function tick(){
      var now = new Date();
      var h = now.getHours().toString().padStart(2,'0');
      var m = now.getMinutes().toString().padStart(2,'0');
      el.textContent = h + ':' + m;

    tick();

  function setEngine(btn){
    curEngine = btn.dataset.engine;
    document.querySelectorAll('.engine-btn').forEach(function(b){ b.classList.remove('active'); });

  function doSearch(){
    var q = document.getElementById('engineInput').value.trim();
    if (!q) return;
    window.open(ENGINES[curEngine] + encodeURIComponent(q), '_blank');

  function init(){
    renderFilters();
    doFilter();
    updateLinkCount();
  }

  function getCount(catKey){
    return DATA.filter(function(d){ return d.cat === catKey; }).length;
  }

  function renderFilters(){
    var bar = document.getElementById('filterBar');
    bar.innerHTML = CATS.map(function(c){
      var count = '';
      if (c.key !== 'all' && c.key !== 'reinstall'){
        count = '<span class="filter-count">' + getCount(c.key) + '</span>';
      }
      return '<button class="filter-btn' + (c.key==='all'?' active':'') + '" onclick="setCat(\'' + c.key + '\',this)"><i class="' + c.icon + '"></i>' + c.label + count + '</button>';
    }).join('');
  }

  function setCat(key, btn){
    curCat = key;
    document.querySelectorAll('.filter-btn').forEach(function(b){ b.classList.remove('active'); });
    btn.classList.add('active');
    doFilter();
  }

  function doFilter(){
    var list;
    if (curCat === 'all'){
      list = FEATURED.map(function(n){ return DATA.find(function(d){ return d.name === n; }); }).filter(Boolean);
    } else if (curCat === 'reinstall'){
      renderReinstall();
      return;
    } else {
      list = DATA.filter(function(d){ return d.cat === curCat; });
    }
    renderCards(list);
  }

  function renderCards(list){
    var grid = document.getElementById('grid');
    if (!list) list = FEATURED.map(function(n){ return DATA.find(function(d){ return d.name === n; }); }).filter(Boolean);
    if (list.length === 0){
      grid.innerHTML = '<div class="empty-state"><i class="fa-solid fa-box-open"></i><p>没有找到匹配的软件</p></div>';
      return;
    }
    grid.innerHTML = list.map(function(d, i){
      var badgeHtml = '';
      if (d.badge === 'hot') badgeHtml = '<span class="badge badge-hot">🔥热门</span>';
      else if (d.badge === 'new') badgeHtml = '<span class="badge badge-new">✨推荐</span>';
      else if (d.badge === 'rec') badgeHtml = '<span class="badge badge-rec">⭐推荐</span>';

      var r = parseInt(d.bg.slice(1,3), 16);
      var g = parseInt(d.bg.slice(3,5), 16);
      var b = parseInt(d.bg.slice(5,7), 16);

      return '<a href="' + d.url + '" target="_blank" rel="noopener" class="glass card visible" style="--card-glow:' + d.bg + ';--glow-rgb:' + r + ',' + g + ',' + b + ';animation-delay:' + (i*35) + 'ms">' +
        badgeHtml +
        '<div class="icon-wrapper" style="background:' + d.bg + '"><i class="' + d.icon + '"></i></div>' +
        '<h3 class="card-title">' + d.name + '</h3>' +
        '<p class="card-desc">' + d.desc + '</p>' +
        '<span class="card-action">访问下载 <i class="fa-solid fa-arrow-right" style="font-size:10px"></i></span>' +
      '</a>';
    }).join('');

    attachTilt();
  }

    var grid = document.getElementById('grid');

        '<i class="fa-brands fa-weixin" style="color:#07c160;font-size:18px;"></i>' +
        '<span style="font-size:19px;font-weight:700;letter-spacing:1px;color:#fff;user-select:all;">CFos1847</span>' +
      '</div>' +
    '</div>';
  }

  function attachTilt(){
    var cards = document.querySelectorAll('.card');
    for (var i = 0; i < cards.length; i++){
      (function(card){
        card.addEventListener('mousemove', function(e){
          var rect = card.getBoundingClientRect();
          var x = e.clientX - rect.left;
          var y = e.clientY - rect.top;
          var cx = rect.width / 2;
          var cy = rect.height / 2;
          var rotY = ((x - cx) / cx) * 8;
          var rotX = ((cy - y) / cy) * 8;
          card.style.transform = 'perspective(700px) rotateX(' + rotX + 'deg) rotateY(' + rotY + 'deg) translateY(-4px)';
        });
        card.addEventListener('mouseleave', function(){
          card.style.transform = 'perspective(700px) rotateX(0) rotateY(0) translateY(0)';
        });
      })(cards[i]);
    }
  }

  function updateLinkCount(){
    document.getElementById('linkCount').textContent = '共 ' + DATA.length + ' 个链接';

  function toggleTheme(){
    var body = document.body;
    body.classList.toggle('dark-mode');
    var isDark = body.classList.contains('dark-mode');
    localStorage.setItem('nav-theme', isDark ? 'dark' : 'light');
    document.querySelector('.theme-toggle i').className = isDark ? 'fa-solid fa-sun' : 'fa-solid fa-moon';
    if (typeof window._bgSetDark === 'function') window._bgSetDark(isDark);
  }

  (function(){
    if (localStorage.getItem('nav-theme') === 'dark'){
      document.body.classList.add('dark-mode');
      document.querySelector('.theme-toggle i').className = 'fa-solid fa-sun';
      if (typeof window._bgSetDark === 'function') window._bgSetDark(true);
    }
  })();
